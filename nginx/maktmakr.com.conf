# Piped — reverse proxy for maktmakr.com → next.js standalone on :3001
#
# Phase 1: HTTP only (for the Let's Encrypt HTTP-01 challenge to succeed).
# Once certbot --nginx runs, it'll rewrite this file to add the :443 server
# block + the http→https redirect.

server {
    server_name maktmakr.com www.maktmakr.com;

    # Required for the ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Increase max upload size — we POST base64-encoded user images for
    # creative generation.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeouts — creative generation can take a while
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/maktmakr.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/maktmakr.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.maktmakr.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = maktmakr.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name maktmakr.com www.maktmakr.com;
    return 404; # managed by Certbot




}