# Piped — reverse proxy for piped.world → next.js standalone on :3001
#
# Phase 1: HTTP only (for the Let's Encrypt HTTP-01 challenge to succeed).
# Once certbot --nginx runs, it'll rewrite this file to add the :443 server
# block + the http→https redirect.

server {
    listen 80;
    listen [::]:80;
    server_name piped.world www.piped.world;

    # Required for the ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Increase max upload size — we POST base64-encoded user images for
    # creative generation.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeouts — creative generation can take a while
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
